<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Aleraco</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-on { background: #4caf50; color: white; }
        .btn-off { background: #f44336; color: white; }
        .btn-shutdown { background: transparent; border: 1px solid #ff5252; color: #ff5252; margin-top: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Controllo Casa</h2>
    <div id="status" style="font-size: 0.7rem; color: #666; margin-bottom: 20px;">CONNESSIONE...</div>
    
    <button class="btn btn-on" onclick="send('cmnd/tasmota/Power', 'ON')">ACCENDI SISTEMA</button>
    
    <button class="btn btn-shutdown" onclick="confirmShutdown()">🛑 SPEGNI RASPBERRY</button>
    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
    
    <button class="btn btn-off" onclick="send('cmnd/tasmota/Power', 'OFF')">SPEGNI ALIMENTAZIONE</button>
</div>

<script>
    const client = mqtt.connect('wss://65371a5291b54c35acd05f6e347252e4.s1.eu.hivemq.cloud:8884/mqtt', {
        username: 'tasmota',
        password: 'Alitalia*1'
    });

    client.on('connect', () => {
        document.getElementById('status').innerText = "SISTEMA ONLINE";
    });

    function send(topic, msg) {
        client.publish(topic, msg);
    }

    function confirmShutdown() {
        if (confirm("Sei sicuro di voler spegnere il Raspberry? Dopo dovrai riaccenderlo dalla presa.")) {
            send('cmnd/jellyfin/system', 'SHUTDOWN');
            alert("Comando inviato!");
        }
    }
</script>

</body>
</html>
