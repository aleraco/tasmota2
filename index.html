<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleraco Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
        .control-card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .status-dot {
            height: 10px; width: 10px;
            background-color: #dee2e6;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background-color: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        
        .btn-custom {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s;
            margin-bottom: 1rem;
            width: 100%;
            border: none;
        }
        .btn-on { background-color: #007AFF; color: white; }
        
        /* Stile per lo Spegni Luce a due stadi */
        .btn-off { background-color: #007AFF; color: white; }
        .btn-off.confirm { background-color: #FF9500; color: white; } /* Arancione avviso */

        .btn-shutdown {
            color: #FF3B30;
            border: 1px solid #FF3B30;
            background: transparent;
            font-size: 0.85rem;
            margin-top: 1.5rem;
        }

        #countdown-box {
            display: none;
            margin-top: 1rem;
            padding: 10px;
            border-radius: 12px;
            background-color: #fff2f1;
            color: #FF3B30;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="control-card">
    <h2>Casa Aleraco</h2>
    <div class="mb-4">
        <span id="dot" class="status-dot"></span>
        <small id="status-text" class="text-muted">Connessione...</small>
    </div>

    <button class="btn btn-custom btn-on" onclick="send('cmnd/tasmota/Power', 'ON')">
        Accendi Luce
    </button>
    
    <button id="off-btn" class="btn btn-custom btn-off" onclick="handleOffClick()">
        Spegni Luce
    </button>

    <hr>

    <button id="shutdown-btn" class="btn btn-custom btn-shutdown" onclick="confirmShutdown()">
        Spegnimento Sistema
    </button>

    <div id="countdown-box">
        Sequenza avviata: <span id="timer">15</span>s
    </div>
</div>

<script>
    const client = mqtt.connect('wss://65371a5291b54c35acd05f6e347252e4.s1.eu.hivemq.cloud:8884/mqtt', {
        username: 'tasmota',
        password: 'Alitalia*1'
    });

    client.on('connect', () => {
        document.getElementById('dot').classList.add('online');
        document.getElementById('status-text').innerText = "Sistema Online";
        document.getElementById('status-text').classList.replace('text-muted', 'text-success');
    });

    function send(topic, msg) { client.publish(topic, msg); }

    // Logica Doppio Tap per SPEGNI LUCE
    let offStage = 0;
    let offTimeout;

    function handleOffClick() {
        const btn = document.getElementById('off-btn');
        if (offStage === 0) {
            offStage = 1;
            btn.innerText = "Sicuro di spegnere?";
            btn.classList.add('confirm');
            offTimeout = setTimeout(() => {
                resetOffBtn();
            }, 3000);
        } else {
            clearTimeout(offTimeout);
            send('cmnd/tasmota/Power', 'OFF');
            resetOffBtn();
        }
    }

    function resetOffBtn() {
        const btn = document.getElementById('off-btn');
        offStage = 0;
        btn.innerText = "Spegni Luce";
        btn.classList.remove('confirm');
    }

    // Logica SHUTDOWN con Countdown
    function confirmShutdown() {
        if (confirm("Sei sicuro? Il Raspberry si spegnerà e la presa si scollegherà dopo 15 secondi.")) {
            const btn = document.getElementById('shutdown-btn');
            const box = document.getElementById('countdown-box');
            const timerSpan = document.getElementById('timer');
            
            btn.disabled = true;
            box.style.display = "block";
            
            send('cmnd/jellyfin/system', 'SHUTDOWN');

            let timeLeft = 15;
            const interval = setInterval(() => {
                timeLeft--;
                timerSpan.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    box.innerHTML = "✅ Raspberry spento, alimentazione OFF";
                    box.style.backgroundColor = "#d4edda";
                    box.style.color = "#155724";
                    btn.style.display = "none";
                }
            }, 1000);
        }
    }
</script>

</body>
</html>
